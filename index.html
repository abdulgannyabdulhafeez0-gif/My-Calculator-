<!DOCTYPE html>
<html>
<head>
  <title>My Calculator</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; font-family: sans-serif; }
    .calculator { background: #333; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.2); }
    .display { width: 100%; height: 40px; font-size: 24px; text-align: right; margin-bottom: 10px; border: none; border-radius: 5px; }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #eee; }
    button:active { background: #ccc; }
    .operator { background: #ff9800; color: white; }
    .equals { grid-column: span 4; background: #4caf50; color: white; }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" class="display" id="display" disabled>
    <div class="buttons">
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('+')">+</button>
      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('-')">-</button>
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('*')">*</button>
      <button onclick="append('0')">0</button>
      <button onclick="clearDisplay()">C</button>
      <button class="operator" onclick="append('/')">/</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    function append(value) { display.value += value; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
      try { display.value = eval(display.value); } 
      catch (e) { display.value = 'Error'; }
    }
  </script>
</body>
</html>
