<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #202124; font-family: sans-serif; margin: 0; }
    .calculator { background: #3c4043; padding: 20px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.3); width: 90%; max-width: 360px; }
    .display { width: 100%; height: 60px; font-size: 28px; text-align: right; margin-bottom: 15px; border: none; border-radius: 6px; background: #202124; color: white; padding-right: 10px; box-sizing: border-box; }
    .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    button { padding: 15px 5px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; background: #5f6368; color: white; }
    button:active { background: #70757a; }
    .operator { background: #f1f3f4; color: #202124; }
    .scientific { background: #dadce0; color: #202124; font-size: 14px; font-weight: bold; }
    .equals { grid-column: span 2; background: #1a73e8; color: white; }
    .clear { background: #ea4335; color: white; }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" class="display" id="display" disabled>
    <div class="buttons">
      <!-- Scientific Row 1 -->
      <button class="scientific" onclick="scientific('sin')">sin</button>
      <button class="scientific" onclick="scientific('cos')">cos</button>
      <button class="scientific" onclick="scientific('tan')">tan</button>
      <button class="scientific" onclick="scientific('sqrt')">√</button>
      <button class="clear" onclick="clearDisplay()">C</button>

      <!-- Scientific Row 2 & Numbers -->
      <button class="scientific" onclick="scientific('log')">log</button>
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('/')">/</button>

      <!-- Row 3 -->
      <button class="scientific" onclick="scientific('exp')">x²</button>
      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('*')">*</button>

      <!-- Row 4 -->
      <button class="scientific" onclick="scientific('pi')">π</button>
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('-')">-</button>

      <!-- Row 5 -->
      <button onclick="append('.')">.</button>
      <button onclick="append('0')">0</button>
      <button class="operator" onclick="append('+')">+</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    
    function append(value) { display.value += value; }
    function clearDisplay() { display.value = ''; }
    
    function calculate() {
      try { display.value = eval(display.value); } 
      catch (e) { display.value = 'Error'; }
    }

    function scientific(type) {
      try {
        let currentVal = parseFloat(display.value) || 0;
        if (type === 'sin') display.value = Math.sin(currentVal * Math.PI / 180).toFixed(4);
        if (type === 'cos') display.value = Math.cos(currentVal * Math.PI / 180).toFixed(4);
        if (type === 'tan') display.value = Math.tan(currentVal * Math.PI / 180).toFixed(4);
        if (type === 'sqrt') display.value = Math.sqrt(currentVal);
        if (type === 'log') display.value = Math.log10(currentVal).toFixed(4);
        if (type === 'exp') display.value = Math.pow(currentVal, 2);
        if (type === 'pi') display.value = Math.PI.toFixed(4);
      } catch (e) {
        display.value = 'Error';
      }
    }
  </script>
</body>
</html>
